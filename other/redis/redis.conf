protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300
supervised systemd
pidfile /var/run/hiddify-redis-server.pid
loglevel notice
logfile /opt/hiddify-manager/log/system/redis-server.log
databases 16
always-show-logo yes
dir /opt/hiddify-manager/other/redis/
bind 127.0.0.1

# --- Watashi memory & persistence safety ---
# Root cause of the "panel down / 503 after ~1-2 weeks" issue: redis had NO memory cap,
# and it is the shared store for the Flask cache + celery broker/results. Its dataset grew
# unbounded until the OOM killer killed it (redis -> failed -> panel & background-tasks down).
# maxmemory here is a SAFE FALLBACK; other/redis/install.sh recomputes it from server RAM.
maxmemory 256mb
maxmemory-policy allkeys-lru
# redis here holds only ephemeral cache + celery broker data. Disable RDB snapshots so a
# bgsave fork can't fail on low-RAM servers (which otherwise makes redis refuse writes while
# still showing 'active') and never block writes on a save error.
save ""
stop-writes-on-bgsave-error no
